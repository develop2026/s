name: A

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/main.yml"
      - "requirements.txt"
      - "main.py"
  schedule:
    - cron: '3 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库
      uses: actions/checkout@v4

    - name: 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 运行
      run: python main.py